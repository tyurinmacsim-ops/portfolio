name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HELM_REPOSITORY_CONFIG: ${{ github.workspace }}/.tmp/helm/repositories.yaml
      HELM_REPOSITORY_CACHE: ${{ github.workspace }}/.tmp/helm/cache
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate

      - name: Kustomize render check
        run: kubectl kustomize k8s/demo-api >/dev/null

  smoke:
    runs-on: ubuntu-latest
    needs: validate
    env:
      HELM_REPOSITORY_CONFIG: ${{ github.workspace }}/.tmp/helm/repositories.yaml
      HELM_REPOSITORY_CACHE: ${{ github.workspace }}/.tmp/helm/cache
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - uses: helm/kind-action@v1.10.0
        with:
          cluster_name: platform-demo
          config: kind/kind-config.yaml

      - name: Build app image
        run: docker build -t demo-api:ci app

      - name: Load image into kind
        run: kind load docker-image demo-api:ci --name platform-demo

      - name: Apply Terraform platform
        run: |
          mkdir -p .tmp/helm/cache
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          terraform -chdir=terraform init
          terraform -chdir=terraform apply -auto-approve

      - name: Deploy application
        run: ./scripts/deploy_demo_app.sh demo-api:ci

      - name: Smoke test
        run: ./scripts/smoke_test.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl get svc -A
          kubectl get servicemonitors -A || true
